# Builds and publishes the site to GitHub Pages at https://daviidco.github.io/resume-cv/
# Requires: repo Settings → Pages → Source set to "GitHub Actions" (one-time, done in the GitHub UI).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # deploy automatically on every push to main
  workflow_dispatch: # allow manual runs from the Actions tab

# Minimum permissions needed to publish to Pages via the official actions below.
permissions:
  contents: read
  pages: write
  id-token: write # required to authenticate the deployment to Pages

# Avoid two deployments racing each other; let the latest push win instead of
# cancelling a deploy mid-flight.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Official Astro action: installs deps (via package-lock.json → npm),
      # runs `astro build`, and uploads dist/ as a Pages artifact.
      # node-version is pinned because Astro 7 requires Node >=22.12, while
      # the action's default runner Node (20) is older and fails the build.
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Takes the artifact uploaded by withastro/action and publishes it to
      # GitHub Pages. Only works once Pages → Source is set to "GitHub Actions".
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
